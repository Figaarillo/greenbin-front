<div [attr.data-role]="role">
  <input type="checkbox" id="sidebar-toggle">

  <!-- Sidebar (desktop fixed / mobile overlay) -->
  <div class="sidebar">
    <div class="sidebar-close">
      <label for="sidebar-toggle"><span class="las la-times"></span></label>
    </div>
    <app-sidenav></app-sidenav>
  </div>

  <!-- Mobile hamburger (only visible on mobile, outside header to not overlap) -->
  <label for="sidebar-toggle" class="hamburger-fab" aria-label="Toggle sidebar">
    <span class="las la-bars"></span>
  </label>

  <!-- Main content -->
  <div class="main-content">
    <router-outlet></router-outlet>
  </div>

  <!-- Sidebar overlay -->
  <label for="sidebar-toggle" class="body-label"></label>

  <!-- ═══════ Mobile Tabbar (persistent across child routes) ═══════ -->
  @if (isMobile) {
    <app-mobile-tabbar [items]="tabItems" (fabClick)="goEntrega()" />
  }
</div>
