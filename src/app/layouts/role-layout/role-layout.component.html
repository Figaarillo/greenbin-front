<div [attr.data-role]="role">
  <input type="checkbox" id="sidebar-toggle">

  <!-- Sidebar (desktop fixed / mobile overlay) -->
  <div class="sidebar">
    <div class="sidebar-close">
      <label for="sidebar-toggle"><span class="las la-times"></span></label>
    </div>
    <app-sidenav></app-sidenav>
  </div>

  <!-- Mobile hamburger (only visible on mobile, outside header to not overlap) -->
  <label for="sidebar-toggle" class="hamburger-fab" aria-label="Toggle sidebar">
    <span class="las la-bars"></span>
  </label>

  <!-- Main content -->
  <div class="main-content">
    <router-outlet></router-outlet>
  </div>

  <!-- Sidebar overlay -->
  <label for="sidebar-toggle" class="body-label"></label>

  <!-- ═══════ Mobile Tabbar (persistent across child routes) ═══════ -->
  @if (isMobile) {
    <div class="tabbar" [attr.data-role]="role">

      <!-- Vecino -->
      @if (role === 'vecino') {
        <button class="tab-item" [routerLink]="['/vecino/puntos-verdes']">
          <mat-icon>recycling</mat-icon>
          <span>Puntos</span>
        </button>
        <button class="tab-item fab" [routerLink]="['/vecino/cupones']">
          <mat-icon>local_activity</mat-icon>
        </button>
        <button class="tab-item" [routerLink]="['/vecino/modificar-vecino']">
          <mat-icon>account_circle</mat-icon>
          <span>Perfil</span>
        </button>
      }

      <!-- Responsable -->
      @if (role === 'responsable') {
        <button class="tab-item" [routerLink]="['/responsable/historial-responsable']">
          <mat-icon>bar_chart</mat-icon>
          <span>Historial</span>
        </button>
        <button class="tab-item fab" (click)="goEntrega()">
          <mat-icon>recycling</mat-icon>
        </button>
        <button class="tab-item" [routerLink]="['/modificar-responsable', userId]">
          <mat-icon>account_circle</mat-icon>
          <span>Perfil</span>
        </button>
      }

      <!-- Local -->
      @if (role === 'local') {
        <button class="tab-item" [routerLink]="['/local/cupones-ofrecidos']">
          <mat-icon>local_activity</mat-icon>
          <span>Cupones</span>
        </button>
        <button class="tab-item fab" [routerLink]="['/local/usar-cupon']">
          <mat-icon>qr_code_scanner</mat-icon>
        </button>
        <button class="tab-item" [routerLink]="['/local/modificar-local']">
          <mat-icon>account_circle</mat-icon>
          <span>Perfil</span>
        </button>
      }

    </div>
  }
</div>
