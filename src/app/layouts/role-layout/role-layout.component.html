<div [attr.data-role]="role">
  <input type="checkbox" id="sidebar-toggle">

  <!-- Sidebar (desktop fixed / mobile overlay) -->
  <div class="sidebar">
    <div class="sidebar-close">
      <label for="sidebar-toggle"><span class="las la-times"></span></label>
    </div>
    <app-sidenav></app-sidenav>
  </div>

  <!-- Main content -->
  <div class="main-content">
    <router-outlet></router-outlet>
  </div>

  <!-- Sidebar overlay -->
  <label for="sidebar-toggle" class="body-label"></label>

  <!-- ═══════ Mobile Tabbar (persistent across child routes) ═══════ -->
  @if (isMobile) {
    <app-mobile-tabbar
      [middleItems]="middleItems"
      [profileRoute]="profileRoute"
      (hamburgerClick)="onHamburgerClick()"
      (middleClick)="onMiddleClick($event)"
    />

    <!-- ═══════ Mobile Menú (bottom-sheet, reemplaza el sidebar en mobile) ═══════ -->
    <app-mobile-menu
      [items]="menuItems"
      [userName]="userName"
      [userSubtitle]="userSubtitle"
      [userDetail]="userDetail"
      (navigate)="onMenuNavigate($event)"
      (doLogout)="onMenuLogout()"
    />
  }
</div>
