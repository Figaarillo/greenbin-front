<app-navbar [title]="'Mis Cupones'"  [route]="'/local'"></app-navbar>
    <div class="container mt-3">
    
      <mat-form-field class="w-100">
        <mat-label>Buscar</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Cupón de descuento" #input>
      </mat-form-field>

      <h4 class="text-center">Total: {{dataSource.filteredData.length}} cupones</h4>
      
      <div class="catalog">
        @if(!dataSource.filteredData || dataSource.filteredData.length == 0){
          <div>
            <h5><b>Aquí veras los cupones que ofrezcas</b></h5>
          </div>
        }
        @for (data of dataSource.filteredData; track data) {
          <div class="my-2 cupon-container">
            <mat-card>
                <mat-card-header>
                    <mat-card-title>{{data.titulo}} <i>({{data.descuento}})</i></mat-card-title>
                    <mat-card-subtitle>{{data.descripcion}}</mat-card-subtitle>
                </mat-card-header>
                <mat-card-content class="d-flex justify-content-between">
                    <div>
                        <span class="px-2 price"><b>Costo: 800 puntos</b></span>
                    </div>
                    <div>
                        <button class="btn btn-primary rounded-pill d-inline-flex p-2" (click)="edit(data)"><mat-icon>add</mat-icon> Ver Mas</button>
                        <button class="btn btn-warning rounded-pill" (click)="edit(data)"><mat-icon>edit</mat-icon></button>
                        <button class="btn btn-danger rounded-pill" (click)="delete(data)"><mat-icon>delete</mat-icon></button>
                    </div>
                </mat-card-content>
            </mat-card>
          </div>
        }
    </div>
      

</div>
