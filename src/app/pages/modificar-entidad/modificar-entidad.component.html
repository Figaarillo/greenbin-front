<div data-role="entidad">
  <app-navbar></app-navbar>
  <div class="container mt-3">
    <h2 class="form-title">Modificar Entidad</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field>
        <mat-label>Nombre</mat-label>
        <input matInput placeholder="Nombre" formControlName="name">
        @if (form.get('name')!.hasError('required')) {
          <mat-error>Ingrese un nombre</mat-error>
        }
      </mat-form-field>

      <mat-form-field>
        <mat-label>Provincia</mat-label>
        <mat-select formControlName="province" required>
          <mat-option [value]="province">{{ province }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Localidad</mat-label>
        <input matInput placeholder="Localidad" formControlName="city">
      </mat-form-field>

      <mat-form-field>
        <mat-label>Descripción</mat-label>
        <textarea matInput placeholder="Descripción" formControlName="description"></textarea>
      </mat-form-field>

      <button class="btn-primary-custom" type="submit">Guardar</button>
      <a type="button" [routerLink]="['/listar-entidades']" class="btn-ghost-custom">Cancelar</a>
    </form>
  </div>
</div>
