<div class="container text-center">

    <div class="d-flex flex-wrap justify-content-center gap-4">
        @for(i of items; track i){

            <div class="card-container">
                <div class="d-flex bg-light p-3 card-image">
                    @if(i.category == 'plastico'){
                        <img src="../../../assets/iconos-materiales/plastico.png" class="m-auto w-75">
                    }
                    @if(i.category == 'vidrio'){
                        <img src="../../../assets/iconos-materiales/vidrio.png" class="m-auto w-75">
                    }
                    @if(i.category == 'lata'){
                        <img src="../../../assets/iconos-materiales/lata.png" class="m-auto w-75">
                    }
                    @if(i.category == 'carton'){
                        <img src="../../../assets/iconos-materiales/carton.png" class="m-auto w-75">
                    }
                    @if(i.category == 'papel'){
                        <img src="../../../assets/iconos-materiales/papel.png" class="m-auto w-75">
                    }
                </div>
                <div class="card-body d-flex bg-dark">
                    <div class="m-auto py-2 text-white">
                        <h2 class="m-0 title">{{i.weight}} Kg</h2>
                        <p class="m-0 fw-light">{{i.category.toUpperCase()}}</p>
                    </div>
                </div>
            </div>
        }
    </div>
    
</div>
