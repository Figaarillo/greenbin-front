<div data-role="vecino">
  <app-navbar [title]="'Mis Reciclados'" [route]="'/vecino'"></app-navbar>

  <div class="container">
    @if (deliveries.length === 0) {
      <div class="empty-state">
        <span class="las la-recycle" style="font-size: 3rem; color: var(--muted);"></span>
        <p>Aun no tienes entregas registradas</p>
      </div>
    } @else {
      <div class="summary-cards">
        <div class="summary-card">
          <span class="las la-weight" style="font-size: 2rem; color: var(--accent);"></span>
          <h2>{{ totalWeight | number:'1.1-1' }} kg</h2>
          <small>Total reciclado</small>
        </div>
        <div class="summary-card">
          <span class="las la-star" style="font-size: 2rem; color: #f59e0b;"></span>
          <h2>{{ totalPoints | number }}</h2>
          <small>Puntos obtenidos</small>
        </div>
        <div class="summary-card">
          <span class="las la-exchange-alt" style="font-size: 2rem; color: #3b82f6;"></span>
          <h2>{{ totalTransactions }}</h2>
          <small>Entregas realizadas</small>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <h3>Residuos por categoria</h3>
          <div class="chart-container pie-container">
            <canvas baseChart
              [data]="pieData"
              [options]="pieOptions"
              type="pie">
            </canvas>
          </div>
        </div>

        <div class="chart-card">
          <h3>Mis reciclados por mes</h3>
          <div class="period-scroll-container">
            <div class="period-chart-inner" [style.width]="barChartWidth">
              <canvas baseChart
                [data]="barData"
                [options]="barOptions"
                type="bar">
              </canvas>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
