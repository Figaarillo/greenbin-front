<div class="page-wrap" data-role="vecino">

  <app-page-header title="Catálogo">
    <div class="hdr-chip">
      <mat-icon>stars</mat-icon>
      {{ puntos }} pts disponibles
    </div>
  </app-page-header>

  <div class="c-body">

    <div class="c-search-row">
      <label class="c-search-input">
        <mat-icon>search</mat-icon>
        <input placeholder="Buscar cupón..." (keyup)="onTitleFilter($event)">
      </label>
      <label class="c-search-input narrow">
        <mat-icon>percent</mat-icon>
        <input type="number" min="0" max="100" placeholder="Desc. mín." (input)="onDiscountFilter($event)">
      </label>
    </div>

    @if (!dataSource.filteredData || dataSource.filteredData.length === 0) {
      <div class="c-empty">No se encontraron cupones</div>
    }

    <div class="c-list">
      @for (data of dataSource.filteredData; track data) {
        <div class="c-card" (click)="abrirModal(data)">
          <div class="c-card-icon">
            <mat-icon>local_activity</mat-icon>
          </div>
          <div class="c-card-body">
            <div class="c-card-title">{{ data.title }}</div>
            <div class="c-card-desc">{{ data.description }}</div>
            <span class="c-card-price">{{ data.costInPoints }} pts</span>
          </div>
          <div class="c-card-badge">{{ data.discount }}<span>%</span></div>
        </div>
      }
    </div>

  </div>

  <app-cupon-sheet (cuponCanjeado)="onCuponCanjeado($event)"></app-cupon-sheet>
</div>
