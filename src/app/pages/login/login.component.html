<div class="min-vh-100 w-100 d-flex flex-column">
   
    <div class="home-container d-flex align-items-center" style="margin-top: 10px;">
        <mat-icon [routerLink]="''" style="font-size: 25px; margin-right: 5px; cursor: pointer;">arrow_back</mat-icon>
        <span class="home-text" style="font-size: 18px; cursor: pointer;">Volver</span>
    </div>
 
    <div class="body">
        <div class="body-header">
            <h1 class="m-4">¡Bienvenido!</h1>
            <h4>Inicia sesión con tu cuenta de <b>GreenBin</b></h4>
        </div>
        <div class="body-content">
            <form [formGroup]="form" (ngSubmit)="onSubmit()">
    
                <mat-form-field class="w-100">
                    <mat-label>Usuario o Email</mat-label>
                    <span matTextPrefix class="input-icon"><mat-icon>person</mat-icon></span>
                    <input type="text" matInput placeholder="juanperez@ejemplo.com" formControlName="username">
                </mat-form-field>
    
                <mat-form-field class="w-100 mb-3">
                    <mat-label>Contraseña</mat-label>
                    <span matTextPrefix class="input-icon"><mat-icon>lock</mat-icon></span>
                    <input matInput [type]="hide ? 'password' : 'text'" placeholder="*********" formControlName="password">
                    <button type="button" mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
                      <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>
                    <mat-hint><a [routerLink]="'/forgot-password'">Olvidé mi Contraseña</a></mat-hint>
                </mat-form-field>
    
                <div class="d-flex justify-content-center my-3">
                    <re-captcha [siteKey]="recaptchaSiteKey" (resolved)="onCaptchaResolved($event)"></re-captcha>
                </div>

                <p class="p-4">
                    <button mat-raised-button class="w-100" color="primary" type="submit" [disabled]="form.invalid || !recaptchaToken">Ingresar</button>
                </p>
            </form>
        </div>
    </div>
    <div class="footer d-flex flex-column gap-2 p-3">
        <p class="m-0" style="font-size: 0.9rem; color: #888;">¿No tienes una cuenta?</p>
        <div class="d-flex gap-3">
            <a [routerLink]="['/registrar-vecino']" class="text-decoration-none" style="color: #61c98e;">Registrarme como Vecino</a>
            <span>|</span>
            <a [routerLink]="['/registrar-local']" class="text-decoration-none" style="color: #61c98e;">Registrar mi Local</a>
        </div>
    </div>
</div>
