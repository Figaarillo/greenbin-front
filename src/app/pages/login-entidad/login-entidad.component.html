<div class="h-100 w-100">
    <div class="home-container d-flex align-items-center" style="margin-top: 10px;">
        <mat-icon [routerLink]="''" style="font-size: 25px; margin-right: 5px; cursor: pointer;">home</mat-icon>
        <span class="home-text" style="font-size: 18px; cursor: pointer;">Home</span>
    </div>
        <div class="body">
        <div class="body-header">
            <h1 class="m-4">¡Bienvenido!</h1>
            <h4>Iniciaras como <span><b>Entidad</b></span></h4>
        </div>
        <div class="body-content">
          
                
                <form [formGroup]="form" (ngSubmit)="onSubmit()">
        
                    <mat-form-field class="w-100">
                        <mat-label>Email</mat-label>
                        <span matTextPrefix class="input-icon"><mat-icon>person</mat-icon></span>
                        <input type="text" matInput placeholder="example@email.com" formControlName="username">
                    </mat-form-field>
        
                    <mat-form-field class="w-100 mb-3">
                        <mat-label>Contraseña</mat-label>
                        <span matTextPrefix class="input-icon"><mat-icon>lock</mat-icon></span>
                        <input matInput [type]="hide ? 'password' : 'text'" placeholder="*********" formControlName="password">
                        <button mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
                          <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
                        </button>
                        <mat-hint><a href="#">Olvidé mi Contraseña</a></mat-hint>
                    </mat-form-field>
        
                    <mat-checkbox [color]="'primary'">Mantener sesión iniciada!</mat-checkbox>
        
                    
                    <p class="p-4">
                        <button mat-raised-button class="w-100" type="submit" [disabled]="form.invalid">Ingresar</button>
                    </p>
        
                </form>
        
        </div>
    </div>
  
</div>
