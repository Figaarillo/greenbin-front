<div class="h-100 w-100">
    <div class="home-container d-flex align-items-center" style="margin-top: 10px;">
        <mat-icon [routerLink]="'/login'" style="font-size: 25px; margin-right: 5px; cursor: pointer;">arrow_back</mat-icon>
        <span [routerLink]="'/login'" style="font-size: 18px; cursor: pointer;">Volver</span>
    </div>

    <div class="body">
        <div class="body-header">
            <h1 class="m-4">Recuperar contraseña</h1>
            <h4>Te enviaremos un código a tu correo</h4>
        </div>
        <div class="body-content">
            <form [formGroup]="form" (ngSubmit)="onSubmit()">

                <mat-form-field class="w-100">
                    <mat-label>Tipo de usuario</mat-label>
                    <span matTextPrefix class="input-icon"><mat-icon>person</mat-icon></span>
                    <mat-select formControlName="userType">
                        @for (type of userTypes; track type.value) {
                            <mat-option [value]="type.value">{{ type.label }}</mat-option>
                        }
                    </mat-select>
                </mat-form-field>

                <mat-form-field class="w-100 mb-3">
                    <mat-label>Email</mat-label>
                    <span matTextPrefix class="input-icon"><mat-icon>email</mat-icon></span>
                    <input type="email" matInput placeholder="ejemplo@correo.com" formControlName="email">
                </mat-form-field>

                <p class="p-4">
                    <button mat-raised-button class="w-100" type="submit" [disabled]="form.invalid || loading">
                        {{ loading ? 'Enviando...' : 'Enviar código' }}
                    </button>
                </p>

            </form>
        </div>
    </div>
</div>
