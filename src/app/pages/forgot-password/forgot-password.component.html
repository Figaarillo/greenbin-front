<div class="login-page has-form" data-role="vecino">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-hero">
      <div class="hero-icon"><mat-icon>lock_reset</mat-icon></div>
      <h2>Recuperar contraseña</h2>
      <p>Te enviaremos un código a tu correo</p>
    </div>
    <div class="login-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <mat-form-field class="w-100">
          <mat-label>Tipo de usuario</mat-label>
          <span matTextPrefix class="input-icon"><mat-icon>person</mat-icon></span>
          <mat-select formControlName="userType">
            @for (type of userTypes; track type.value) {
              <mat-option [value]="type.value">{{ type.label }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field class="w-100 mb-3">
          <mat-label>Email</mat-label>
          <span matTextPrefix class="input-icon"><mat-icon>email</mat-icon></span>
          <input type="email" matInput placeholder="ejemplo@correo.com" formControlName="email">
        </mat-form-field>

        <p class="p-4">
          <button mat-raised-button class="btn-submit w-100" type="submit" [disabled]="form.invalid || loading">
            {{ loading ? 'Enviando...' : 'Enviar código' }}
          </button>
        </p>

      </form>
    </div>
    <div class="login-footer">
      <a class="back-link" [routerLink]="'/login'">
        <mat-icon>arrow_back</mat-icon> Volver al inicio
      </a>
    </div>
  </div>
</div>
