<div class="login-page" data-role="vecino">
  <div class="login-card">
    <div class="login-hero">
      <div class="hero-icon"><mat-icon>lock_reset</mat-icon></div>
      <h2>Nueva contraseña</h2>
      <p>Ingresá el código que recibiste y tu nueva contraseña</p>
    </div>
    <div class="login-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <mat-form-field class="w-100">
          <mat-label>Código de verificación</mat-label>
          <span matTextPrefix class="input-icon"><mat-icon>pin</mat-icon></span>
          <input type="text" matInput placeholder="123456" formControlName="otp" maxlength="6">
        </mat-form-field>

        <mat-form-field class="w-100">
          <mat-label>Nueva contraseña</mat-label>
          <span matTextPrefix class="input-icon"><mat-icon>lock</mat-icon></span>
          <input matInput [type]="hideNew ? 'password' : 'text'" formControlName="newPassword">
          <button mat-icon-button matSuffix type="button" (click)="hideNew = !hideNew">
            <mat-icon>{{ hideNew ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field class="w-100 mb-2">
          <mat-label>Confirmar contraseña</mat-label>
          <span matTextPrefix class="input-icon"><mat-icon>lock_reset</mat-icon></span>
          <input matInput [type]="hideConfirm ? 'password' : 'text'" formControlName="confirmPassword">
          <button mat-icon-button matSuffix type="button" (click)="hideConfirm = !hideConfirm">
            <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        @if (passwordsMismatch && form.get('confirmPassword')?.dirty) {
          <p class="error-msg">Las contraseñas no coinciden</p>
        }

        <p class="p-4">
          <button mat-raised-button class="btn-submit w-100" type="submit"
            [disabled]="form.invalid || passwordsMismatch || loading">
            {{ loading ? 'Actualizando...' : 'Cambiar contraseña' }}
          </button>
        </p>

      </form>
    </div>
    <div class="login-footer">
      <a class="back-link" [routerLink]="'/forgot-password'">
        <mat-icon>arrow_back</mat-icon> Volver
      </a>
    </div>
  </div>
</div>
