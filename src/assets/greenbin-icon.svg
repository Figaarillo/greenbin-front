<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="GreenBin">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#0F5132"/>
    </linearGradient>
    <linearGradient id="leaf-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)"/>

  <!-- Círculo interior translúcido -->
  <circle cx="256" cy="256" r="168" fill="rgba(255,255,255,0.10)"/>

  <!-- Símbolo de reciclaje (3 flechas) suave, blanco semitransparente -->
  <g transform="translate(256,240) scale(0.85)" fill="rgba(255,255,255,0.20)" stroke="rgba(255,255,255,0.20)" stroke-width="2.5">
    <!-- Flecha 1 (superior) -->
    <path d="M0,-80 L20,-40 L10,-40 L10,10 L-10,10 L-10,-40 L-20,-40 Z" transform="rotate(0)"/>
    <!-- Flecha 2 (inferior derecha) -->
    <path d="M0,-80 L20,-40 L10,-40 L10,10 L-10,10 L-10,-40 L-20,-40 Z" transform="rotate(120)"/>
    <!-- Flecha 3 (inferior izquierda) -->
    <path d="M0,-80 L20,-40 L10,-40 L10,10 L-10,10 L-10,-40 L-20,-40 Z" transform="rotate(240)"/>
  </g>

  <!-- Hoja principal (sobre el reciclaje) -->
  <path d="M200,360 C190,300 220,200 300,130 C340,160 370,220 360,300 C340,340 280,380 200,360 Z"
        fill="url(#leaf-grad)" opacity="0.95"/>

  <!-- Nervadura central de la hoja -->
  <path d="M210,345 C260,300 315,240 345,170"
        fill="none" stroke="#1E9E5A" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

  <!-- Nervaduras laterales -->
  <path d="M240,290 C270,275 300,230 310,200"
        fill="none" stroke="#1E9E5A" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M265,320 C280,310 310,275 325,240"
        fill="none" stroke="#1E9E5A" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <path d="M225,260 C245,240 260,200 265,180"
        fill="none" stroke="#1E9E5A" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
</svg>
